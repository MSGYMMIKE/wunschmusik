<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Wunschmusik – Studio</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#2a2a2a;--green:#1DB954;--text:#f0f0f0;--muted:#777;--danger:#e05252;--yellow:#f0c040}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  #gateWrap{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-box{width:100%;max-width:340px;text-align:center}
  .gate-logo{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:4px;background:linear-gradient(135deg,#1DB954,#4dff91);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
  .gate-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#444;margin-bottom:32px}
  .gate-err{color:var(--danger);font-size:13px;margin-bottom:12px;min-height:20px}
  .gate-input{display:block;width:100%;background:#111;border:1.5px solid #2a2a2a;border-radius:12px;padding:15px 18px;font-size:16px;font-family:'DM Sans',sans-serif;color:#f0f0f0;outline:none;margin-bottom:12px;text-align:center;transition:border-color .2s}
  .gate-input:focus{border-color:var(--green)}
  .gate-btn{display:block;width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s}
  .gate-btn:hover{background:#22e566}
  .gate-btn:disabled{opacity:.5;cursor:not-allowed}
  #appWrap{display:none;flex-direction:column;align-items:center;width:100%}
  header{width:100%;max-width:700px;padding:34px 24px 12px;text-align:center}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,10vw,70px);letter-spacing:4px;line-height:1;background:linear-gradient(135deg,#1DB954,#4dff91);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .tagline{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
  .limit-bar{width:calc(100% - 48px);max-width:700px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:12px}
  .limit-label{color:var(--muted);flex:1}
  .limit-dots{display:flex;gap:5px;margin:0 12px}
  .limit-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s}
  .limit-dot.used{background:var(--green)}
  .limit-dot.full{background:var(--yellow)}
  .limit-reset{font-size:10px;color:var(--muted);white-space:nowrap}
  .sbar{width:calc(100% - 48px);max-width:700px;border-radius:10px;padding:10px 15px;display:flex;align-items:center;gap:9px;margin-bottom:12px;font-size:12px;transition:all .3s}
  .sbar.loading{background:var(--surface);border:1px solid #222;color:var(--muted)}
  .sbar.online{background:rgba(29,185,84,.07);border:1px solid rgba(29,185,84,.2);color:#1DB954}
  .sbar.offline{background:#1a0a00;border:1px solid rgba(240,192,64,.35);color:var(--yellow)}
  .sbar.warn{background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.3);color:var(--yellow)}
  .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .sbar.loading .sdot{background:var(--muted);animation:blink 1.5s infinite}
  .sbar.online .sdot{background:#1DB954;animation:blink 3s infinite}
  .sbar.offline .sdot,.sbar.warn .sdot{background:var(--yellow)}
  .main{width:100%;max-width:700px;padding:0 24px 80px;display:flex;flex-direction:column;gap:16px}
  .search-wrap{position:relative}
  .search-wrap input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:15px 56px 15px 20px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--green)}
  .search-wrap input::placeholder{color:var(--muted)}
  .search-wrap input:disabled{opacity:.35;cursor:not-allowed}
  .sbtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--green);border:none;border-radius:8px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000}
  .sbtn:disabled{opacity:.35;cursor:not-allowed}
  .section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 0 2px}
  .results-list{display:flex;flex-direction:column;gap:8px}
  .track-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:11px;animation:fadeIn .22s ease both}
  .track-art{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
  .track-info{flex:1;min-width:0}
  .track-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-artist{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .track-dur{font-size:11px;color:var(--muted)}
  .add-btn{border:1.5px solid var(--green);background:none;color:var(--green);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
  .add-btn:hover:not(:disabled){background:var(--green);color:#000}
  .add-btn:disabled{opacity:.4;cursor:not-allowed;border-color:var(--muted);color:var(--muted)}
  .add-btn.in-queue{border-color:#555;color:#555}
  .add-btn.playing{border-color:var(--green);color:var(--green)}
  .add-btn.limit{border-color:var(--yellow);color:var(--yellow)}
  .now-playing{background:linear-gradient(135deg,#0d2b1a,#0a1f12);border:1px solid rgba(29,185,84,.25);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px}
  .np-art{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0}
  .np-info{flex:1;min-width:0}
  .np-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:3px}
  .np-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .np-artist{font-size:12px;color:var(--muted);margin-top:2px}
  .np-right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
  .pulse{width:10px;height:10px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
  .np-time{font-size:10px;color:var(--muted)}
  .prog-wrap{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:7px;overflow:hidden}
  .prog-bar{height:100%;background:var(--green);border-radius:2px;transition:width .5s linear}
  .queue-list{display:flex;flex-direction:column;gap:6px}
  .queue-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:11px;animation:slideIn .28s ease both}
  .q-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);width:20px;flex-shrink:0;line-height:1}
  .q-art{width:38px;height:38px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0}
  .q-info{flex:1;min-width:0}
  .q-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .q-artist{font-size:11px;color:var(--muted);margin-top:2px}
  .q-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
  .q-badge{font-size:10px;background:rgba(29,185,84,.12);color:#1DB954;border-radius:4px;padding:2px 7px}
  .q-wait{font-size:10px;color:var(--muted)}
  .empty-state{color:var(--muted);font-size:13px;text-align:center;padding:26px 0;border:1.5px dashed var(--border);border-radius:12px}
  .empty-state .icon{font-size:26px;margin-bottom:7px}
  .queue-banner{background:rgba(29,185,84,.06);border:1px solid rgba(29,185,84,.18);border-radius:10px;padding:10px 16px;font-size:12px;color:#1DB954;text-align:center}
  .divider{border:none;border-top:1px solid var(--border)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);font-weight:600;font-size:13px;padding:11px 22px;border-radius:100px;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;z-index:1000;white-space:nowrap;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.success{background:var(--green);color:#000}
  .toast.error{background:var(--danger);color:#fff}
  .toast.info{background:#2a2a2a;color:#ddd}
  .toast.warn{background:var(--yellow);color:#000}
  .loading{display:flex;justify-content:center;gap:6px;padding:18px 0}
  .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:bounce 1s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  .spin-i{display:inline-block;width:12px;height:12px;border:2px solid #333;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.78)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- GATE -->
<div id="gateWrap">
  <div class="gate-box" id="step1">
    <div class="gate-logo">🎵 WUNSCHMUSIK</div>
    <div class="gate-sub">Studio – Zugangscode</div>
    <div class="gate-err" id="pwErr"></div>
    <input class="gate-input" type="password" id="pwInput" placeholder="Passwort eingeben" maxlength="20"/>
    <button class="gate-btn" id="pwBtn" onclick="checkPassword()">Weiter →</button>
  </div>
  <div class="gate-box" id="step2" style="display:none">
    <div class="gate-logo">🎵 WUNSCHMUSIK</div>
    <div class="gate-sub">Wie heisst du?</div>
    <div class="gate-err" id="nameErr"></div>
    <input class="gate-input" type="text" id="nameInput" placeholder="Dein Vorname" maxlength="20"/>
    <button class="gate-btn" onclick="submitName()">Los geht's 🎵</button>
  </div>
</div>

<!-- APP -->
<div id="appWrap">
  <header>
    <div class="logo">🎵 Wunschmusik</div>
    <div class="tagline">Studio – Musik wünschen</div>
  </header>
  <div class="limit-bar" title="Max. 5 Songs pro Stunde">
    <span class="limit-label" id="limitLabel">Deine Wünsche (pro Stunde)</span>
    <div class="limit-dots" id="limitDots"></div>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="limit-reset" id="limitReset"></span>
      <button onclick="changeName()" title="Name ändern"
        style="background:none;border:none;color:#444;font-size:11px;cursor:pointer;padding:0;font-family:inherit">✏️</button>
    </span>
  </div>
  <div class="sbar loading" id="statusBar"><div class="sdot"></div><span id="statusText">Verbindung wird hergestellt…</span></div>
  <div class="main">
    <div id="npWrap" style="display:none"></div>
    <div id="queueBanner" style="display:none"></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Song, Künstler oder Album suchen…" autocomplete="off" disabled/>
      <button class="sbtn" id="searchBtn" onclick="doSearch()" disabled>
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <div id="resultsSection" style="display:none">
      <div class="section-label">Suchergebnisse</div>
      <div id="loadingDots" class="loading" style="display:none"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="results-list" id="resultsList"></div>
    </div>
    <hr class="divider" id="divider" style="display:none"/>
    <div>
      <div class="section-label">Warteschlange</div>
      <div style="margin-top:9px">
        <div class="queue-list" id="queueList"></div>
        <div class="empty-state" id="emptyState"><div class="icon">🎶</div>Noch keine Songs in der Warteschlange</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const MEMBER_HASH = 'c07a2869cf69ec8bccb68a53a27ec42933e151ed1618b406fbe5b5b038150cf4';
const MAX_WISHES  = 5;
const WISH_WINDOW = 60 * 60 * 1000;
const BLOCKED_KEYWORDS = ['podcast','predigt','gebet','bibel','quran','worship','prayer','sermon','jesus christ','allah','kirche','moschee','mosque'];

firebase.initializeApp({apiKey:'AIzaSyDquSCF2mwYMnsdEdsCXF-amq0nk-ZbvvQ',authDomain:'msgym-d2a85.firebaseapp.com',projectId:'msgym-d2a85'});
const db = firebase.firestore();

let accessToken=null,memberName='',searchResults=[],sharedQueue=[],nowPlayingId=null,nowPlayingDurMs=0,addingTrack=false,searchController=null,unsubQueue=null,unsubToken=null,unsubNowPlay=null,unsubBL=null,loadRetries=0,lastProgPct=0;
let firebaseBlacklist=[];

function startBlacklistSync(){
  if(unsubBL)unsubBL();
  unsubBL=db.collection('state').doc('blacklist').onSnapshot(snap=>{
    firebaseBlacklist=snap.exists?(snap.data().entries||[]):[];
    // P1-Fix: re-filter already displayed results immediately
    if(searchResults.length){
      searchResults=searchResults.filter(t=>!isBlacklistedByAdmin(t));
      renderResults();
    }
  },()=>{});
}
function isBlacklistedByAdmin(track){
  if(!firebaseBlacklist.length)return false;
  const text=[track.name,...(track.artists||[]).map(a=>a.name)].join(' ').toLowerCase();
  return firebaseBlacklist.some(b=>text.includes(b.term.toLowerCase()));
}

// ── GATE ──────────────────────────────────────────────────────────────────────
document.getElementById('pwInput').onkeydown   = e => { if(e.key==='Enter') checkPassword(); };
document.getElementById('nameInput').onkeydown = e => { if(e.key==='Enter') submitName(); };

async function checkPassword() {
  const btn=document.getElementById('pwBtn'), val=document.getElementById('pwInput').value.trim(), err=document.getElementById('pwErr');
  if(!val){err.textContent='❌ Bitte Passwort eingeben';return;}
  if(btn.disabled)return;
  btn.disabled=true; btn.innerHTML='<span class="spin-i"></span>Prüfe…'; err.textContent='';
  try {
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
    const hash=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===MEMBER_HASH){
      localStorage.setItem('member_ok', (Date.now() + 30*24*60*60*1000).toString()); // 30-Tage Expiry
      document.getElementById('step1').style.display='none';
      document.getElementById('step2').style.display='block';
      document.getElementById('nameInput').focus();
    } else {
      err.textContent='❌ Falscher Code – frag dein Studio-Team';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
      btn.disabled=false; btn.textContent='Weiter →';
    }
  } catch(e){err.textContent='❌ Fehler – Seite neu laden';btn.disabled=false;btn.textContent='Weiter →';}
}

function submitName() {
  const val=document.getElementById('nameInput').value.trim(), err=document.getElementById('nameErr');
  if(!val||val.length<2){err.textContent='❌ Bitte deinen Vornamen eingeben (min. 2 Zeichen)';return;}
  memberName=val;
  localStorage.setItem('member_name',val); // localStorage = bleibt gespeichert
  showApp();
}

function showApp() {
  if(!memberName) memberName=localStorage.getItem('member_name')||'';
  document.getElementById('gateWrap').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  if(memberName) document.getElementById('limitLabel').textContent=memberName+' – Wünsche';
  updateLimitBar();
  loadToken();
  renderQueue();
  updateMemberPresence(); // register as active
  startPresenceInterval(); // start periodic presence updates
  const inp=document.getElementById('searchInput');
  inp.onkeydown=e=>{if(e.key==='Enter')doSearch();};
  inp.oninput=()=>{
    clearTimeout(window._deb);
    const q=inp.value.trim();
    if(q.length>2) window._deb=setTimeout(doSearch,600);
    else if(!q){document.getElementById('resultsSection').style.display='none';document.getElementById('divider').style.display='none';}
  };
}

function changeName() {
  // P1-Fix D-02: stop all Firebase listeners before returning to name screen
  if(unsubQueue)    { unsubQueue();    unsubQueue=null; }
  if(unsubToken)    { unsubToken();    unsubToken=null; }
  if(unsubNowPlay)  { unsubNowPlay();  unsubNowPlay=null; }
  if(unsubBL)       { unsubBL();       unsubBL=null; }  // P1-Fix: was missing
  clearInterval(presenceInterval); presenceInterval=null; // cleanup presence interval
  clearInterval(reconnectTimer);  reconnectTimer=null;  // cleanup reconnect timer
  localStorage.removeItem('member_name');
  memberName = '';
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('gateWrap').style.display = 'flex';
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').focus();
}

// ── MEMBER PRESENCE ───────────────────────────────────────────────────────────
function updateMemberPresence() {
  if (!memberName) return;
  const ref = db.collection('state').doc('members');
  db.runTransaction(async tx => {
    const snap    = await tx.get(ref);
    const active  = snap.exists ? (snap.data().active || []) : [];
    const now     = Date.now();
    const others  = active.filter(m => m.name !== memberName && now - m.lastSeen < 10*60*1000);
    tx.set(ref, { active: [...others, { name: memberName, lastSeen: now }], updated: now });
  }).catch(() => {});
}
// Update presence every 2 minutes while app is open
let presenceInterval = null;
function startPresenceInterval() {
  clearInterval(presenceInterval);
  presenceInterval = setInterval(() => { if (memberName) updateMemberPresence(); }, 2 * 60 * 1000);
}

// ── HISTORY WRITE ─────────────────────────────────────────────────────────────
async function writeToHistory(track) {
  try {
    const ref    = db.collection('state').doc('history');
    const now    = Date.now();
    const cutoff = now - 7 * 24 * 60 * 60 * 1000;
    const entry  = {
      id:       track.id,
      name:     track.name,
      artist:   track.artists?.map(a => a.name).join(', ') || '',
      art:      track.album?.images?.[2]?.url || '',
      wishedBy: memberName || 'Unbekannt',
      wishedAt: now
    };
    // P2-Fix: use transaction to avoid race condition with simultaneous wishes
    await db.runTransaction(async tx => {
      const snap = await tx.get(ref);
      const old  = snap.exists ? (snap.data().entries || []).filter(e => e.wishedAt > cutoff) : [];
      tx.set(ref, { entries: [...old, entry], updated: now });
    });
  } catch(e) {}
}


function getWishes(){try{const r=localStorage.getItem('wish_data');if(!r)return[];const d=JSON.parse(r);return(d.wishes||[]).filter(t=>Date.now()-t<WISH_WINDOW);}catch(e){return[];}}
function saveWishes(a){localStorage.setItem('wish_data',JSON.stringify({wishes:a}));}
function canWish(){return getWishes().length<MAX_WISHES;}
function addWish(){const a=getWishes();a.push(Date.now());saveWishes(a);updateLimitBar();}
function getResetMin(){const w=getWishes();if(!w.length)return null;return Math.max(0,Math.round((Math.min(...w)+WISH_WINDOW-Date.now())/60000));}
function updateLimitBar(){
  const dots=document.getElementById('limitDots'),reset=document.getElementById('limitReset');
  if(!dots||!reset)return;
  const used=getWishes().length;
  dots.innerHTML='';
  for(let i=0;i<MAX_WISHES;i++){const d=document.createElement('div');d.className='limit-dot'+(i<used?(used>=MAX_WISHES&&i===MAX_WISHES-1?' full':' used'):'');dots.appendChild(d);}
  if(used>=MAX_WISHES){const min=getResetMin()??60;reset.textContent=`Reset in ${min} Min.`;}
  else reset.textContent=`${used}/${MAX_WISHES}`;
}

// ── TOKEN ─────────────────────────────────────────────────────────────────────
// Auto-reconnect: check connection every 30s, reconnect if offline
let reconnectTimer = null;
function startReconnectWatch() {
  clearInterval(reconnectTimer);
  reconnectTimer = setInterval(() => {
    const status = document.getElementById('statusBar').className;
    if (status.includes('offline') || status.includes('warn')) {
      // Silently try to reconnect without showing loading state
      db.collection('config').doc('spotify').get().then(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        if (d.token && d.expires > Date.now() + 30000) {
          accessToken = d.token;
          onReady();
        }
      }).catch(() => {});
    }
  }, 30000);
}

async function loadToken(){
  loadRetries = 0; // D-01: reset on every fresh attempt
  setStatus('loading','Verbindung wird hergestellt…');
  try{
    const snap=await db.collection('config').doc('spotify').get();
    if(!snap.exists){setStatus('offline','Keine Verbindung – Admin informieren');startReconnectWatch();return;}
    const d=snap.data();
    if(d.token&&d.expires>Date.now()+30000){accessToken=d.token;loadRetries=0;onReady();}
    else{setStatus('offline','Verbindung abgelaufen – Admin informieren');startReconnectWatch();}
  }catch(e){
    loadRetries++;
    if(loadRetries<=3){setStatus('loading',`Verbindungsfehler – Versuch ${loadRetries}/3…`);setTimeout(loadToken,1500*loadRetries);}
    else{setStatus('offline','Verbindungsfehler – wird automatisch erneut versucht');startReconnectWatch();}
  }
}
function onReady(){
  setStatus('online','Verbunden – Musik wünschen!');
  document.getElementById('searchInput').disabled=false;
  document.getElementById('searchBtn').disabled=false;
  startListeners();
  startReconnectWatch();
}

// Auto-reconnect on network restore
window.addEventListener('online', () => {
  const status = document.getElementById('statusBar')?.className || '';
  if (status.includes('offline') || status.includes('warn')) loadToken();
});
window.addEventListener('offline', () => {
  setStatus('warn', 'Keine Internetverbindung – wird automatisch wiederverbunden…');
});
function startListeners(){
  startBlacklistSync();
  if(unsubToken)unsubToken();
  unsubToken=db.collection('config').doc('spotify').onSnapshot(snap=>{
    if(!snap.exists)return;
    const d=snap.data();
    if(d.token&&d.token!==accessToken&&d.expires>Date.now()){accessToken=d.token;if(document.getElementById('statusBar').className.includes('offline'))onReady();}
    if(d.expires<=Date.now()){setStatus('offline','Verbindung abgelaufen – Admin informieren');document.getElementById('searchInput').disabled=true;document.getElementById('searchBtn').disabled=true;}
  },()=>setStatus('warn','Verbindungsproblem'));
  if(unsubQueue)unsubQueue();
  unsubQueue=db.collection('state').doc('queue').onSnapshot(snap=>{
    sharedQueue=snap.exists?(snap.data().tracks||[]):[];
    renderQueue();renderQueueBanner();if(searchResults.length)refreshButtons();
  },()=>setStatus('warn','Queue-Verbindung unterbrochen'));
  if(unsubNowPlay)unsubNowPlay();
  unsubNowPlay=db.collection('state').doc('nowplaying').onSnapshot(snap=>{
    if(!snap.exists||!snap.data().item){
      document.getElementById('npWrap').style.display='none';
      if(nowPlayingId)lastProgPct=0;nowPlayingId=null;nowPlayingDurMs=0;
      if(searchResults.length)refreshButtons();return;
    }
    const d=snap.data();
    if(d.item?.id!==nowPlayingId)lastProgPct=0;
    nowPlayingId=d.item?.id||null;nowPlayingDurMs=d.durationMs||0;
    renderNowPlaying(d.item,d.progressMs,d.durationMs);
    if(searchResults.length)refreshButtons();
  });
  // Heartbeat-Warnung entfernt – Server läuft autonom, kein Admin-Tab nötig.
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function isBlocked(track){
  if(track.type&&track.type!=='track')return true;
  const text=[track.name||'',(track.artists||[]).map(a=>a.name).join(' '),track.album?.name||''].join(' ').toLowerCase();
  return BLOCKED_KEYWORDS.some(kw=>text.includes(kw));
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q||!accessToken)return;
  if(searchController)searchController.abort();
  searchController=new AbortController();
  const list=document.getElementById('resultsList'),dots=document.getElementById('loadingDots');
  document.getElementById('resultsSection').style.display='block';
  document.getElementById('divider').style.display='block';
  list.innerHTML='';dots.style.display='flex';
  try{
    const res=await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=10`,{headers:{'Authorization':`Bearer ${accessToken}`},signal:searchController.signal});
    dots.style.display='none';
    if(res.status===401){dots.style.display='none';setStatus('offline','Verbindung abgelaufen – Admin informieren');return;}
    if(res.status===400){
      const err=await res.json().catch(()=>({}));
      list.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">Fehler: ${err?.error?.message||'Bitte Admin neu verbinden'}</div>`;
      return;
    }
    if(!res.ok){list.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">Fehler ${res.status}</div>`;return;}
    const data=await res.json();
    const all=data.tracks?.items||[];
    searchResults=all.filter(t=>!isBlocked(t)&&!isBlacklistedByAdmin(t)).slice(0,8);
    if(!searchResults.length){
      const msg=all.length>0?`Keine passenden Ergebnisse für „${esc(q)}" (Inhalte gefiltert)`:`Keine Ergebnisse für „${esc(q)}"`;
      list.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">${msg}</div>`;return;
    }
    renderResults();
  }catch(e){if(e.name==='AbortError')return;dots.style.display='none';list.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">Fehler – erneut versuchen</div>`;}
}
function renderResults(){
  const list=document.getElementById('resultsList'),atLimit=!canWish();
  list.innerHTML='';
  searchResults.forEach((track,i)=>{
    const art=track.album?.images?.[2]?.url||track.album?.images?.[0]?.url||'';
    const inQueue=!!sharedQueue.find(t=>t.id===track.id),isNow=nowPlayingId===track.id,blocked=atLimit&&!inQueue&&!isNow;
    const card=document.createElement('div');card.className='track-card';card.style.animationDelay=`${i*35}ms`;
    card.innerHTML=`<img class="track-art" src="${esc(art)}" alt="" loading="lazy"/>
      <div class="track-info"><div class="track-name">${esc(track.name)}</div><div class="track-artist">${esc(track.artists?.map(a=>a.name).join(', '))}</div></div>
      <div class="track-meta"><span class="track-dur">${msToMin(track.duration_ms)}</span>
        <button class="add-btn ${isNow?'playing':inQueue?'in-queue':blocked?'limit':''}" id="ab-${i}" onclick="addToQueue(${i})" ${isNow||inQueue||blocked?'disabled':''}>
          ${isNow?'▶ Läuft':inQueue?'✓ Liste':blocked?'🚫 Limit':'+ Wünschen'}</button></div>`;
    list.appendChild(card);
  });
}
function refreshButtons(){
  const atLimit=!canWish();
  searchResults.forEach((track,i)=>{
    const btn=document.getElementById(`ab-${i}`);if(!btn)return;
    const inQueue=!!sharedQueue.find(t=>t.id===track.id),isNow=nowPlayingId===track.id,blocked=atLimit&&!inQueue&&!isNow;
    btn.disabled=isNow||inQueue||blocked;
    btn.className='add-btn '+(isNow?'playing':inQueue?'in-queue':blocked?'limit':'');
    btn.textContent=isNow?'▶ Läuft':inQueue?'✓ Liste':blocked?'🚫 Limit':'+ Wünschen';
  });
}

// ── ADD TO QUEUE ──────────────────────────────────────────────────────────────
async function addToQueue(i){
  if(addingTrack)return;
  const track=searchResults[i];if(!track)return;
  if(!canWish()){showToast(`🚫 Limit erreicht – Reset in ${getResetMin()??60} Min.`,'warn');return;}
  if(sharedQueue.find(t=>t.id===track.id)){showToast('Bereits in der Warteschlange','info');return;}
  if(nowPlayingId===track.id){showToast('Dieser Song spielt gerade','info');return;}
  addingTrack=true;
  const btn=document.getElementById(`ab-${i}`);
  if(btn){btn.disabled=true;btn.textContent='…';}
  try{
    const queueRef=db.collection('state').doc('queue');
    const trackNamed={...track,wishedBy:memberName||'Unbekannt'};
    await Promise.race([
      db.runTransaction(async tx=>{
        const snap=await tx.get(queueRef);
        const current=snap.exists?(snap.data().tracks||[]):[];
        if(current.find(t=>t.id===track.id))throw new Error('duplicate');
        tx.set(queueRef,{tracks:[...current,trackNamed],updated:Date.now()});
      }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),10000))
    ]);
    addWish();updateLimitBar();
    writeToHistory(track);       // write to 7-day history
    updateMemberPresence();      // update presence
    const pos=sharedQueue.length+1,waitMs=estimateWait(),waitStr=waitMs>0?` (~${msToMin(waitMs)} Wartezeit)`:'',left=MAX_WISHES-getWishes().length;
    showToast(`🎵 Song #${pos} gewünscht${waitStr}! Noch ${left} übrig.`,'success');
    if(btn){btn.disabled=true;btn.className='add-btn in-queue';btn.textContent='✓ Liste';}
  }catch(e){
    if(e.message==='duplicate'){showToast('Bereits in der Warteschlange','info');if(btn){btn.disabled=true;btn.className='add-btn in-queue';btn.textContent='✓ Liste';}}
    else if(e.message==='timeout'){showToast('Zeitüberschreitung – erneut versuchen','error');if(btn){btn.disabled=false;btn.textContent='+ Wünschen';}}
    else{showToast('Fehler – erneut versuchen','error');if(btn){btn.disabled=false;btn.textContent='+ Wünschen';}}
  }finally{addingTrack=false;}
}
function estimateWait(){
  const rem=nowPlayingId&&nowPlayingDurMs>0?Math.max(0,nowPlayingDurMs*(1-lastProgPct/100)):0;
  return rem+sharedQueue.reduce((s,t)=>s+(t.duration_ms||210000),0);
}

// ── NOW PLAYING ───────────────────────────────────────────────────────────────
function renderNowPlaying(item,prog,dur){
  const wrap=document.getElementById('npWrap');
  if(!item){wrap.style.display='none';return;}
  const art=item.album?.images?.[1]?.url||'',rem=Math.max(0,(dur||0)-(prog||0));
  const pct=Math.max(dur>0?Math.round((prog||0)/dur*100):0,lastProgPct);lastProgPct=pct;
  wrap.style.display='block';
  wrap.innerHTML=`<div class="now-playing"><img class="np-art" src="${esc(art)}" alt=""/>
    <div class="np-info"><div class="np-label">▶ Wird jetzt gespielt</div><div class="np-name">${esc(item.name)}</div>
    <div class="np-artist">${esc(item.artists?.map(a=>a.name).join(', '))}</div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div></div>
    <div class="np-right"><div class="pulse"></div><div class="np-time">${msToMin(rem)}</div></div></div>`;
}

// ── QUEUE ─────────────────────────────────────────────────────────────────────
function renderQueue(){
  const list=document.getElementById('queueList'),empty=document.getElementById('emptyState');
  list.innerHTML='';
  if(!sharedQueue.length){empty.style.display='block';return;}
  empty.style.display='none';
  let ms=nowPlayingId&&nowPlayingDurMs>0?Math.max(0,nowPlayingDurMs*(1-lastProgPct/100)):0;
  sharedQueue.forEach((t,i)=>{
    const art=t.album?.images?.[2]?.url||'',wait=i===0?(ms>5000?`~${msToMin(ms)}`:'Als nächstes'):`~${msToMin(ms)}`;
    ms+=(t.duration_ms||210000);
    const el=document.createElement('div');el.className='queue-item';el.style.animationDelay=`${i*28}ms`;
    el.innerHTML=`<div class="q-num">${i+1}</div><img class="q-art" src="${esc(art)}" alt="" loading="lazy"/>
      <div class="q-info"><div class="q-name">${esc(t.name)}</div>
      <div class="q-artist">${esc(t.artists?.map(a=>a.name).join(', '))}${t.wishedBy?` · von ${esc(t.wishedBy)}`:''}</div></div>
      <div class="q-right"><div class="q-badge">${i===0?'Als nächstes':'#'+(i+1)}</div><div class="q-wait">${wait}</div></div>`;
    list.appendChild(el);
  });
}
function renderQueueBanner(){
  const b=document.getElementById('queueBanner');
  if(sharedQueue.length>0){b.style.display='block';b.innerHTML=`<div class="queue-banner">🎵 ${sharedQueue.length} Song${sharedQueue.length>1?'s':''} in der Warteschlange</div>`;}
  else b.style.display='none';
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setStatus(type,text){document.getElementById('statusBar').className='sbar '+type;document.getElementById('statusText').textContent=text;}
function msToMin(ms){if(!ms||ms<0)return'';return`${Math.floor(ms/60000)}:${Math.floor((ms%60000)/1000).toString().padStart(2,'0')}`;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3500);}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function(){
  // Use localStorage so browser remembers across sessions
  const _mo  = localStorage.getItem('member_ok');
  const ok   = _mo && parseInt(_mo) > Date.now(); // 30-Tage Expiry prüfen
  const name = localStorage.getItem('member_name') || '';
  if(ok && name){ memberName=name; showApp(); }
  else if(ok){ document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; }
})();
</script>
